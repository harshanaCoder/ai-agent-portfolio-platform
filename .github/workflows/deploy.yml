name: Ai Agent Portfolio

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full CI checks (lint, typecheck, data validation, build)
        env:
          NEXT_TELEMETRY_DISABLED: 1
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npm run ci

  smoke-test:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          NEXT_TELEMETRY_DISABLED: 1
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npm run build

      - name: Start app and run route smoke checks
        env:
          NEXT_TELEMETRY_DISABLED: 1
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          dump_logs() {
            echo "=== Next.js Server Logs ==="
            if [ -f /tmp/next-start.log ]; then
              cat /tmp/next-start.log
            else
              echo "No startup log file found."
            fi
          }

          fail_with_logs() {
            echo "Smoke test failure: $1"
            dump_logs
            exit 1
          }

          assert_status() {
            local name="$1"
            local expected="$2"
            local method="$3"
            local url="$4"
            local data="${5:-}"

            local tmp_body
            tmp_body=$(mktemp)

            local status
            if [ "$method" = "GET" ]; then
              status=$(curl -sS -o "$tmp_body" -w "%{http_code}" "$url" || echo "000")
            else
              status=$(curl -sS -o "$tmp_body" -w "%{http_code}" -X "$method" \
                -H 'content-type: application/json' \
                -d "$data" "$url" || echo "000")
            fi

            if [ "$status" != "$expected" ]; then
              echo "Check failed: $name"
              echo "Expected status: $expected"
              echo "Actual status: $status"
              echo "Response body:"
              cat "$tmp_body"
              rm -f "$tmp_body"
              fail_with_logs "Unexpected status for $name"
            fi

            rm -f "$tmp_body"
          }

          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/next-start.log 2>&1 &
          APP_PID=$!
          trap 'kill "$APP_PID"' EXIT

          app_ready=0
          for i in {1..45}; do
            if curl -sS -o /dev/null http://127.0.0.1:3000; then
              app_ready=1
              break
            fi
            sleep 1
          done

          if [ "$app_ready" -ne 1 ]; then
            fail_with_logs "App did not become ready on http://127.0.0.1:3000"
          fi

          assert_status "home page" "200" "GET" "http://127.0.0.1:3000"
          assert_status "voice-agent page" "200" "GET" "http://127.0.0.1:3000/voice-agent"
          assert_status "assistant api" "200" "POST" "http://127.0.0.1:3000/api/assistant" '{"prompt":"health check","projectSlug":"ai-agent-portfolio-platform"}'

          # Use an intentionally invalid payload shape to validate route wiring
          # without requiring external AI provider credentials in CI.
          assert_status "ai api validation" "400" "POST" "http://127.0.0.1:3000/api/ai" '{"message":""}'
